    <!-- Canonical for the bare root: consolidate signals into /de -->

    <!-- Hreflang alternates for the bare root -->

    <link rel="alternate" hreflang="fr-CH" href="https://equiviemed.ch/fr" />
    <link rel="alternate" hreflang="en" href="https://equiviemed.ch/en" />
    <link rel="alternate" hreflang="x-default" href="https://equiviemed.ch/de" />

    <!-- Canonical and OG tags are set per-page by react-helmet-async -->
    <!-- Static fallbacks for the SPA shell (overridden on pre-rendered pages) -->
    <meta property="og:site_name" content="Equivie MED" />

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RDS351HW0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3RDS351HW0');

    <!-- Font Preconnect (before @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload hero image so it starts downloading in parallel with JS -->
    <link rel="preload" as="image" href="/hero.jpg" fetchpriority="high" />

    <!-- Inline boot styles so the loading skeleton is visible immediately,
         without waiting for the CSS bundle -->
    <style>
      html, body { margin: 0; padding: 0; background: #f5f1e8; }
      .equivie-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #f5f1e8;
        color: #2d3a2e;
        font-family: Georgia, 'Times New Roman', serif;
        text-align: center;
        padding: 24px;
        transition: opacity 0.3s ease-out;
      }
      .equivie-boot__brand {
        font-size: clamp(28px, 6vw, 44px);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .equivie-boot__tagline {
        margin-top: 10px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #6b7268;
        letter-spacing: 0.04em;
      }
      .equivie-boot__dot {
        display: inline-block;
        width: 8px; height: 8px;
        margin: 24px 3px 0;
        border-radius: 50%;
        background: #2d3a2e;
        opacity: 0.3;
        animation: equivie-pulse 1.2s infinite ease-in-out;
      }
      .equivie-boot__dot:nth-child(2) { animation-delay: 0.15s; }
      .equivie-boot__dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes equivie-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
        40% { opacity: 1; transform: scale(1.2); }
      }
      /* Hide the boot screen the moment React has rendered */
      #root:not(:empty) ~ .equivie-boot { display: none; }
    </style>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalBusiness",
      "name": "Equivie MED",
      "url": "https://equiviemed.ch",
      "description": "Switzerland's first dedicated menopause telehealth clinic. FMH-licensed gynaecologists specialising in perimenopause, menopause, and hormone therapy.",
      "medicalSpecialty": "Gynecology",
      "currenciesAccepted": "CHF",
      "paymentAccepted": "Credit Card, TWINT",
      "areaServed": {
        "@type": "Country",
        "name": "Switzerland"
      },
      "availableService": {
        "@type": "MedicalProcedure",
        "name": "Menopause Video Consultation",
        "procedureType": "https://schema.org/NoninvasiveProcedure",
        "description": "45-60 minute video consultation with a menopause-specialised gynaecologist. Includes diagnosis, personalised treatment plan, and prescription."
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need a referral?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. In Switzerland, you can see a gynaecologist directly without a GP referral. You simply book and pay."
          }
        },
        {
          "@type": "Question",
          "name": "Is the consultation covered by health insurance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The CHF 300 consultation fee is self-pay. However, any medications prescribed (HRT, progesterone, etc.) are covered by your Grundversicherung if they are on the Spezialitaetenliste. Some Zusatzversicherung plans also cover prevention and complementary consultations."
          }
        },
        {
          "@type": "Question",
          "name": "Will I be prescribed hormones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "That depends entirely on your symptoms, medical history, and preferences. Our doctor will discuss all evidence-based options with you — hormonal, non-hormonal, and lifestyle-based — and together you'll decide what's right for your situation."
          }
        },
        {
          "@type": "Question",
          "name": "What makes this different from seeing my regular gynaecologist?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most gynaecologists in Switzerland have not received specialist menopause training — it is not part of the core FMH curriculum. Our doctors have completed additional menopause-specific certification. 45-60 minutes per consultation versus the typical 15-20 minutes, full medical history reviewed in advance, and a written treatment plan."
          }
        },
        {
          "@type": "Question",
          "name": "What symptoms do you treat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hot flashes, night sweats, sleep disruption, mood changes, anxiety, brain fog, joint pain, vaginal dryness, low libido, weight changes, heart palpitations, and fatigue. If your symptoms are related to perimenopause or menopause, we can help."
          }
        }
      ]
    }
    </script>
  </head>
